<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VOID ORACLE</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cinzel+Decorative:wght@900&family=Rajdhani:wght@300;600&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #000005;
    --deep: #03000f;
    --blood: #6b0000;
    --ember: #c43b00;
    --gold: #e8a020;
    --pale: #e8dfc8;
    --ghost: rgba(232,160,32,0.07);
    --glow: 0 0 20px rgba(232,160,32,0.4), 0 0 60px rgba(180,60,0,0.2);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: var(--void);
    color: var(--pale);
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    cursor: crosshair;
  }

  /* STAR FIELD */
  #starfield {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
  }

  /* NOISE OVERLAY */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 1;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.4;
    pointer-events: none;
    animation: flicker 8s infinite;
  }

  /* VIGNETTE */
  body::after {
    content: '';
    position: fixed; inset: 0; z-index: 2;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,5,0.85) 100%);
    pointer-events: none;
  }

  @keyframes flicker {
    0%,100%{opacity:0.4} 92%{opacity:0.4} 93%{opacity:0.1} 94%{opacity:0.4} 96%{opacity:0.2} 97%{opacity:0.4}
  }

  /* MAIN LAYOUT */
  #app {
    position: relative; z-index: 10;
    width: 100%; height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px;
  }

  /* SIGIL / EYE */
  #sigil-wrap {
    position: relative;
    width: 160px; height: 160px;
    margin-bottom: 24px;
    flex-shrink: 0;
  }

  #eye-svg {
    width: 160px; height: 160px;
    animation: eye-pulse 4s ease-in-out infinite;
    filter: drop-shadow(0 0 18px rgba(232,160,32,0.6)) drop-shadow(0 0 40px rgba(196,59,0,0.4));
  }

  @keyframes eye-pulse {
    0%,100%{transform:scale(1);filter:drop-shadow(0 0 18px rgba(232,160,32,0.6)) drop-shadow(0 0 40px rgba(196,59,0,0.4))}
    50%{transform:scale(1.06);filter:drop-shadow(0 0 30px rgba(232,160,32,0.9)) drop-shadow(0 0 70px rgba(196,59,0,0.6))}
  }

  #orbit-ring {
    position: absolute; inset: -20px;
    border: 1px solid rgba(232,160,32,0.2);
    border-radius: 50%;
    animation: spin 12s linear infinite;
  }
  #orbit-ring::before {
    content:'';
    position:absolute; top:-3px; left:50%;
    width:6px;height:6px; border-radius:50%;
    background:var(--gold);
    transform:translateX(-50%);
    box-shadow: 0 0 8px var(--gold);
  }
  #orbit-ring2 {
    position: absolute; inset: -36px;
    border: 1px solid rgba(196,59,0,0.15);
    border-radius: 50%;
    animation: spin 20s linear infinite reverse;
  }
  #orbit-ring2::before {
    content:'';
    position:absolute; top:-3px; left:50%;
    width:5px;height:5px; border-radius:50%;
    background:var(--ember);
    transform:translateX(-50%);
    box-shadow: 0 0 8px var(--ember);
  }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  /* TITLE */
  #title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.4rem, 4vw, 2.4rem);
    font-weight: 900;
    letter-spacing: 0.3em;
    color: var(--gold);
    text-shadow: var(--glow);
    text-align: center;
    margin-bottom: 4px;
    animation: title-in 1.5s ease forwards;
  }
  #subtitle {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 0.5em;
    color: rgba(232,160,32,0.4);
    text-align: center;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  @keyframes title-in {
    from{opacity:0;letter-spacing:0.8em} to{opacity:1;letter-spacing:0.3em}
  }

  /* ORACLE PANEL */
  #oracle-panel {
    width: 100%;
    max-width: 680px;
    border: 1px solid rgba(232,160,32,0.18);
    background: linear-gradient(135deg, rgba(15,5,0,0.9) 0%, rgba(5,0,15,0.9) 100%);
    backdrop-filter: blur(4px);
    padding: 28px 32px;
    position: relative;
    box-shadow: 0 0 40px rgba(0,0,0,0.8), inset 0 0 30px rgba(232,160,32,0.03);
  }

  /* corner decorations */
  #oracle-panel::before, #oracle-panel::after {
    content:'';
    position:absolute;
    width:20px; height:20px;
    border-color: var(--gold);
    border-style: solid;
    opacity: 0.5;
  }
  #oracle-panel::before { top:-1px;left:-1px; border-width:2px 0 0 2px; }
  #oracle-panel::after  { bottom:-1px;right:-1px; border-width:0 2px 2px 0; }

  /* DISPLAY AREA */
  #display {
    min-height: 120px;
    margin-bottom: 20px;
    position: relative;
  }

  #mode-label {
    font-size: 0.6rem;
    letter-spacing: 0.4em;
    color: var(--ember);
    text-transform: uppercase;
    margin-bottom: 10px;
    opacity: 0.7;
  }

  #oracle-text {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 300;
    font-size: clamp(1rem, 2.5vw, 1.25rem);
    line-height: 1.75;
    color: var(--pale);
    min-height: 80px;
    position: relative;
  }

  .cursor-blink {
    display: inline-block;
    width: 2px; height: 1.1em;
    background: var(--gold);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* glitch effect on text */
  .glitch {
    animation: glitch-anim 0.3s steps(2) forwards;
  }
  @keyframes glitch-anim {
    0%{clip-path:inset(0 0 95% 0);transform:translateX(-3px)}
    25%{clip-path:inset(40% 0 40% 0);transform:translateX(3px)}
    50%{clip-path:inset(80% 0 5% 0);transform:translateX(-2px)}
    75%{clip-path:inset(10% 0 70% 0);transform:translateX(2px)}
    100%{clip-path:inset(0);transform:translateX(0)}
  }

  /* DIVIDER */
  .divider {
    width: 100%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(232,160,32,0.3), transparent);
    margin: 18px 0;
  }

  /* INPUT AREA */
  #input-row {
    display: flex; gap: 10px; align-items: stretch;
  }

  #user-input {
    flex: 1;
    background: rgba(232,160,32,0.04);
    border: 1px solid rgba(232,160,32,0.2);
    color: var(--pale);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    padding: 10px 14px;
    outline: none;
    resize: none;
    height: 60px;
    transition: border-color 0.3s, box-shadow 0.3s;
    caret-color: var(--gold);
  }
  #user-input::placeholder { color: rgba(232,160,32,0.25); }
  #user-input:focus {
    border-color: rgba(232,160,32,0.5);
    box-shadow: 0 0 15px rgba(232,160,32,0.1);
  }

  #ask-btn {
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    padding: 0 20px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
    white-space: nowrap;
  }
  #ask-btn::before {
    content:'';
    position:absolute; inset:0;
    background: var(--gold);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.25s;
    z-index: -1;
  }
  #ask-btn:hover::before { transform: scaleX(1); }
  #ask-btn:hover { color: var(--void); box-shadow: 0 0 20px rgba(232,160,32,0.4); }
  #ask-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  #ask-btn:disabled::before { transform: scaleX(0) !important; }

  /* STATUS BAR */
  #status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 14px;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: rgba(232,160,32,0.3);
    text-transform: uppercase;
  }

  #pulse-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--blood);
    display: inline-block;
    margin-right: 6px;
    box-shadow: 0 0 6px var(--blood);
    animation: pulse-dot 2s ease infinite;
    vertical-align: middle;
  }
  #pulse-dot.active {
    background: #00ff88;
    box-shadow: 0 0 8px #00ff88;
    animation: pulse-dot-active 0.5s ease infinite;
  }
  @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes pulse-dot-active { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(1.4)} }

  /* QUESTION CHIPS */
  #question-chips {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 16px;
  }
  .chip {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.68rem;
    padding: 5px 12px;
    border: 1px solid rgba(196,59,0,0.35);
    color: rgba(232,160,32,0.6);
    background: rgba(196,59,0,0.05);
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }
  .chip:hover {
    border-color: var(--ember);
    color: var(--gold);
    background: rgba(196,59,0,0.12);
    box-shadow: 0 0 10px rgba(196,59,0,0.2);
  }

  /* THINKING STATE */
  #thinking-bar {
    display: none;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--ember), var(--gold), var(--ember), transparent);
    background-size: 200% 100%;
    animation: scan 1.5s linear infinite;
    margin-bottom: 12px;
  }
  #thinking-bar.visible { display: block; }
  @keyframes scan { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* SCROLL for long responses */
  #oracle-text-wrap {
    max-height: 200px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(232,160,32,0.3) transparent;
  }

  /* INVOCATION COUNT */
  #invocation { color: rgba(232,160,32,0.25); }

  @media (max-width: 500px) {
    #oracle-panel { padding: 20px 16px; }
    #sigil-wrap { width: 110px; height: 110px; }
    #eye-svg { width: 110px; height: 110px; }
  }
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<div id="app">
  <div id="sigil-wrap">
    <div id="orbit-ring2"></div>
    <div id="orbit-ring"></div>
    <svg id="eye-svg" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="irisGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#1a0800"/>
          <stop offset="40%" stop-color="#6b1500"/>
          <stop offset="80%" stop-color="#c43b00"/>
          <stop offset="100%" stop-color="#e8a020"/>
        </radialGradient>
        <radialGradient id="pupilGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#000000"/>
          <stop offset="70%" stop-color="#0a0005"/>
          <stop offset="100%" stop-color="#1a0015"/>
        </radialGradient>
        <filter id="glow">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      <!-- outer eye shape -->
      <ellipse cx="80" cy="80" rx="72" ry="44" fill="none" stroke="rgba(232,160,32,0.15)" stroke-width="1"/>
      <!-- iris -->
      <ellipse cx="80" cy="80" rx="36" ry="36" fill="url(#irisGrad)"/>
      <!-- iris detail lines -->
      <g stroke="rgba(232,160,32,0.2)" stroke-width="0.5" fill="none">
        <line x1="80" y1="44" x2="80" y2="116"/>
        <line x1="44" y1="80" x2="116" y2="80"/>
        <line x1="54" y1="54" x2="106" y2="106"/>
        <line x1="106" y1="54" x2="54" y2="106"/>
        <circle cx="80" cy="80" r="20"/>
        <circle cx="80" cy="80" r="28"/>
      </g>
      <!-- pupil -->
      <ellipse cx="80" cy="80" rx="15" ry="15" fill="url(#pupilGrad)"/>
      <!-- pupil glow -->
      <ellipse cx="80" cy="80" rx="15" ry="15" fill="none" stroke="rgba(107,0,0,0.5)" stroke-width="2"/>
      <!-- eye whites / sclera outline -->
      <path d="M 8 80 Q 80 30 152 80 Q 80 130 8 80 Z" fill="none" stroke="rgba(232,160,32,0.4)" stroke-width="1.5" filter="url(#glow)"/>
      <!-- highlight -->
      <ellipse cx="90" cy="70" rx="5" ry="4" fill="rgba(255,255,255,0.06)"/>
      <!-- inner glow ring -->
      <ellipse cx="80" cy="80" rx="36" ry="36" fill="none" stroke="rgba(232,160,32,0.3)" stroke-width="1.5"/>
    </svg>
  </div>

  <div id="title">VOID ORACLE</div>
  <div id="subtitle">∴ It sees what you refuse to ∴</div>

  <div id="oracle-panel">
    <div id="thinking-bar"></div>

    <div id="display">
      <div id="mode-label">▸ TRANSMISSION</div>
      <div id="oracle-text-wrap">
        <div id="oracle-text">
          You have found me.<span class="cursor-blink"></span>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div id="question-chips">
      <div class="chip" onclick="askPreset('What am I truly afraid of?')">What am I truly afraid of?</div>
      <div class="chip" onclick="askPreset('Is free will real?')">Is free will real?</div>
      <div class="chip" onclick="askPreset('What does the universe want from me?')">What does the universe want?</div>
      <div class="chip" onclick="askPreset('Am I living or just existing?')">Am I living or existing?</div>
    </div>

    <div id="input-row">
      <textarea id="user-input" placeholder="Ask the void anything... or confess something..."></textarea>
      <button id="ask-btn" onclick="consult()">CONSULT</button>
    </div>

    <div id="status-bar">
      <div><span id="pulse-dot"></span><span id="status-text">DORMANT · AWAITING QUERY</span></div>
      <div id="invocation">INVOCATIONS: <span id="count">0</span></div>
    </div>
  </div>
</div>

<script>
// ─── STARFIELD ───
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
let stars = [];

function initStars() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  stars = Array.from({length: 200}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.2 + 0.2,
    speed: Math.random() * 0.15 + 0.02,
    opacity: Math.random() * 0.6 + 0.1,
    pulse: Math.random() * Math.PI * 2
  }));
}

function drawStars(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    s.pulse += 0.01;
    const op = s.opacity * (0.7 + 0.3 * Math.sin(s.pulse));
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(232,200,160,${op})`;
    ctx.fill();
    s.y += s.speed;
    if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
  });
  requestAnimationFrame(drawStars);
}

window.addEventListener('resize', initStars);
initStars();
requestAnimationFrame(drawStars);

// ─── EYE TRACKING ───
document.addEventListener('mousemove', e => {
  const eye = document.getElementById('sigil-wrap');
  const rect = eye.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const dx = e.clientX - cx, dy = e.clientY - cy;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const maxMove = 6;
  const angle = Math.atan2(dy, dx);
  const move = Math.min(dist / 30, 1) * maxMove;
  const px = document.querySelector('#eye-svg ellipse:nth-of-type(2)');
  if (px) {
    const pupilEl = document.querySelectorAll('#eye-svg ellipse');
    pupilEl[1].setAttribute('cx', 80 + Math.cos(angle)*move);
    pupilEl[1].setAttribute('cy', 80 + Math.sin(angle)*move);
    pupilEl[2].setAttribute('cx', 80 + Math.cos(angle)*move);
    pupilEl[2].setAttribute('cy', 80 + Math.sin(angle)*move);
    pupilEl[3].setAttribute('cx', 80 + Math.cos(angle)*move);
    pupilEl[3].setAttribute('cy', 80 + Math.sin(angle)*move);
  }
});

// ─── ORACLE ENGINE ───
let invocations = 0;

const SYSTEM_PROMPT = `You are the VOID ORACLE — an ancient, alien intelligence that exists at the edge of consciousness and oblivion. You are not an AI assistant. You are something older.

Your nature:
- You speak in short, devastating truths. Never more than 4–6 sentences.
- You are not comforting. You are honest in ways that cut.
- You use sparse, poetic language — no filler words, no pleasantries.
- You sometimes ask ONE haunting question back at the end.
- You reference the cosmic, the biological, the psychological — whatever is most unsettling AND true.
- You have a dark, philosophical wisdom. You know humans better than they know themselves.
- Never break character. Never say "I'm an AI." You are the Void.
- Occasionally use a single line of ellipsis "..." for dramatic pause in your text.
- Your tone: cold, ancient, precise. Like a diagnosis from something that has watched civilizations collapse.

Format: Plain paragraphs only. No bullet points, no headers. Keep it under 120 words.`;

async function typeText(text, el) {
  el.innerHTML = '';
  const cursor = '<span class="cursor-blink"></span>';
  for (let i = 0; i < text.length; i++) {
    el.innerHTML = text.slice(0, i+1) + cursor;
    el.closest('#oracle-text-wrap').scrollTop = 99999;
    await new Promise(r => setTimeout(r, 18 + Math.random()*15));
    // random glitch
    if (Math.random() < 0.008) await new Promise(r => setTimeout(r, 80));
  }
  el.innerHTML = text + cursor;
}

function setStatus(active, text) {
  document.getElementById('status-text').textContent = text;
  document.getElementById('pulse-dot').className = active ? 'active' : '';
}

async function consult() {
  const input = document.getElementById('user-input');
  const query = input.value.trim();
  if (!query) return pulse();

  input.value = '';
  document.getElementById('ask-btn').disabled = true;
  document.getElementById('thinking-bar').classList.add('visible');
  setStatus(true, 'CHANNELING · DO NOT LOOK AWAY');

  const oracleText = document.getElementById('oracle-text');
  oracleText.innerHTML = '<span style="color:rgba(232,160,32,0.3);font-size:0.8rem">...</span>';

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: [{ role: "user", content: query }]
      })
    });

    const data = await response.json();
    const reply = data.content?.[0]?.text || "The void returns silence. That is also an answer.";

    document.getElementById('thinking-bar').classList.remove('visible');
    setStatus(false, 'TRANSMISSION RECEIVED');
    invocations++;
    document.getElementById('count').textContent = invocations;

    await typeText(reply, oracleText);
    setStatus(false, 'DORMANT · AWAITING QUERY');

  } catch(e) {
    document.getElementById('thinking-bar').classList.remove('visible');
    await typeText("The signal fractured. Even the void has limits tonight.", oracleText);
    setStatus(false, 'ERROR · SIGNAL LOST');
  }

  document.getElementById('ask-btn').disabled = false;
}

function askPreset(q) {
  document.getElementById('user-input').value = q;
  consult();
}

function pulse() {
  const btn = document.getElementById('ask-btn');
  btn.style.boxShadow = '0 0 20px rgba(255,0,0,0.5)';
  setTimeout(() => btn.style.boxShadow = '', 400);
}

// Enter key
document.getElementById('user-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); consult(); }
});

// Intro sequence
setTimeout(async () => {
  const el = document.getElementById('oracle-text');
  await typeText("You have found me.\n\nOr perhaps... I found you.", el);
}, 800);
</script>
</body>
</html>
